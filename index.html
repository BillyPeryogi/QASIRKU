<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUKAMI Superapp</title>
    <style>
        :root {
            --maroon: #800000;
            --gold: #D4AF37;
            --gold-metallic: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --bg-dark: #1a1a1a;
            --text-light: #f5f5f5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark); color: var(--text-light);
            height: 100vh; overflow: hidden;
        }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center;
            align-items: center; z-index: 9999;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid var(--maroon);
            border-top: 5px solid var(--gold); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Login Page */
        #p-login {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px;
            background: linear-gradient(135deg, var(--maroon) 0%, #4a0000 100%);
        }
        .login-card {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 30px; border-radius: 20px; width: 100%; max-width: 350px;
            border: 1px solid rgba(212, 175, 55, 0.3); text-align: center;
        }
        .login-card h2 { color: var(--gold); margin-bottom: 25px; letter-spacing: 2px; }
        .login-card input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px;
            border: none; background: rgba(255,255,255,0.9); font-size: 16px;
        }
        .btn-login {
            width: 100%; padding: 12px; margin-top: 20px; border-radius: 10px;
            border: none; background: var(--gold-metallic); color: var(--maroon);
            font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* App Content */
        #app-content { display: none; height: 100vh; display: flex; flex-direction: column; }

        /* Header */
        .header {
            background: var(--maroon); padding: 15px; display: flex;
            align-items: center; justify-content: space-between;
            border-bottom: 2px solid var(--gold);
        }
        .header .profile-section { display: flex; align-items: center; gap: 10px; }
        .header img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--gold); background: #eee; }
        .header .info { display: flex; flex-direction: column; }
        .header .info b { font-size: 14px; color: var(--gold); }
        .header .info span { font-size: 12px; }

        /* Main Scrollable Area */
        .main-container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }

        /* Dashboard Card */
        .card-saldo {
            background: linear-gradient(45deg, #4a0000, var(--maroon));
            border-radius: 15px; padding: 20px; border: 1px solid var(--gold);
            margin-bottom: 20px; position: relative; overflow: hidden;
        }
        .card-saldo::after {
            content: ''; position: absolute; top: -50%; right: -20%;
            width: 150px; height: 150px; background: rgba(212, 175, 55, 0.1);
            border-radius: 50%;
        }
        .card-saldo label { font-size: 12px; color: #ccc; }
        .card-saldo h1 { margin: 5px 0; font-size: 28px; color: var(--gold); }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box {
            background: #2a2a2a; padding: 15px; border-radius: 12px;
            border-left: 4px solid var(--gold);
        }
        .stat-box label { font-size: 11px; display: block; margin-bottom: 5px; color: #aaa; }
        .stat-box b { font-size: 18px; color: var(--text-light); }

        /* Navigation Bottom */
        .nav-bottom {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #111; display: flex; justify-content: space-around;
            padding: 10px 0; border-top: 1px solid var(--maroon);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 10px; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }

        .rank-badge {
            background: var(--gold-metallic); color: var(--maroon);
            padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <!-- PAGE: LOGIN -->
    <div id="p-login">
        <div class="login-card">
            <h2>KUKAMI</h2>
            <input type="text" id="user" placeholder="Nama Rider" autocomplete="off">
            <input type="password" id="pin" placeholder="PIN" inputmode="numeric">
            <button class="btn-login" onclick="prosesLogin()">LOG IN</button>
        </div>
    </div>

    <!-- PAGE: MAIN APP -->
    <div id="app-content" style="display:none;">
        <div class="header">
            <div class="profile-section">
                <img id="r-foto" src="" alt="Profile">
                <div class="info">
                    <b id="r-nama">Memuat...</b>
                    <span id="r-kelas">Rider</span>
                </div>
            </div>
            <div id="rk-h-on"></div>
        </div>

        <div class="main-container">
            <!-- Home Page -->
            <div id="p-home" class="page active">
                <div class="card-saldo">
                    <label>Saldo Anda</label>
                    <h1 id="r-saldo">Rp 0</h1>
                </div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <label>Total Hari Ini</label>
                        <b id="h-total">0</b>
                    </div>
                    <div class="stat-box">
                        <label>Total Bulan Ini</label>
                        <b id="b-total">0</b>
                    </div>
                    <div class="stat-box" style="border-color: #27ae60;">
                        <label>Selesai (ON)</label>
                        <b id="h-on">0</b>
                    </div>
                    <div class="stat-box" style="border-color: #e74c3c;">
                        <label>Batal (OFF)</label>
                        <b id="h-off">0</b>
                    </div>
                </div>
                
                <div style="text-align: center; margin-top: 30px;">
                   <button onclick="logout()" style="background:none; border:1px solid #555; color:#888; padding:8px 20px; border-radius:20px;">Keluar Akun</button>
                </div>
            </div>
        </div>

        <div class="nav-bottom">
            <div class="nav-item active" id="n-home" onclick="location.reload()">
                <i>🏠</i><span>Beranda</span>
            </div>
            <div class="nav-item">
                <i>🕒</i><span>Riwayat</span>
            </div>
            <div class="nav-item">
                <i>💳</i><span>Top Up</span>
            </div>
            <div class="nav-item">
                <i>⚙️</i><span>Akun</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
